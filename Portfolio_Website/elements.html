			<!-- Main -->

				<section class="post">
					<header class="major">
						<span class="date">Contact</span>
						<h1>Let's Connect</h1>
						<p>I'm open to data analytics roles, freelance work, and collaboration.</p>
					</header>

					<div class="contact-layout">

						<!-- Form -->
						<div class="contact-form-col">
							<form method="post" action="https://formspree.io/f/mkoqkweq">
								<div class="fields">
									<div class="field">
										<label for="name">Name</label>
										<input type="text" name="name" id="name" placeholder="Your name" required />
									</div>
									<div class="field">
										<label for="email">Email</label>
										<input type="email" name="email" id="email" placeholder="Your email" required />
									</div>
									<div class="field">
										<label for="message">Message</label>
										<textarea name="message" id="message" rows="5" placeholder="Your message..." required></textarea>
									</div>
								</div>
								<ul class="actions">
									<li><input type="submit" value="Send Message" class="primary" /></li>
								</ul>
							</form>
						</div>

						<!-- Links -->
						<div class="contact-links-col">
							<div class="contact-link-item">
								<span class="contact-link-label">Email</span>
								<a href="mailto:yalagha@outlook.com">yalagha@outlook.com</a>
							</div>
							<div class="contact-link-item">
								<span class="contact-link-label">LinkedIn</span>
								<a href="https://www.linkedin.com/in/younis-alagha-60159526b" target="_blank" rel="noopener noreferrer">Younis Alagha</a>

							<div class="contact-link-item">
